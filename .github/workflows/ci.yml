name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: shellcheck -s sh mkcd.sh test/test.sh
      - name: tests (sh, bash, zsh)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq zsh
          sh test/test.sh
          bash test/test.sh
          zsh test/test.sh

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: build .deb
        run: sh packaging/build-deb.sh
      - name: attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.deb"
